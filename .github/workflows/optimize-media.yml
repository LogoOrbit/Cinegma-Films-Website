name: Optimize & publish media

# Fires when the dashboard finishes streaming an upload to the staging branch
# (the manifest.json is written last). The job assembles the uploaded chunks,
# compresses the file with ffmpeg, and commits the optimized result to the
# production branch — then clears the staging files.
on:
  push:
    branches: [media-staging]
    paths:
      - 'assets/videos/_staging/**/manifest.json'

# Avoid two uploads publishing to the production branch at the same time.
concurrency:
  group: optimize-media
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: media-staging
          fetch-depth: 0

      - name: Ensure ffmpeg is available
        run: ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)

      - name: Optimize and publish
        env:
          # Override with a repo variable named PROD_BRANCH if you don't publish to main.
          PROD_BRANCH: ${{ vars.PROD_BRANCH || 'main' }}
        run: bash .github/scripts/optimize-media.sh
